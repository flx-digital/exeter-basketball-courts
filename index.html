<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Find basketball courts near you." />
    <title>Find public outdoor basketball courts in Exeter</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./">🏀 <span>Public Basketball Courts Map</span></a>
      <a class="suggest" href="mailto:hwei01645@gmail.com?subject=Basketball%20court%20update">Suggest an update</a>
    </header>

    <main>
      <aside class="sidebar" aria-label="Court search and filters">
        <h1>Find public outdoor basketball courts in Exeter</h1>
        <p class="intro">Discover your nearest basketball courts, information about their condition and photos.</p>
        <label class="search-label" for="search">Search by place or court</label>
        <input id="search" type="search" placeholder="e.g. Brighton" autocomplete="off" />

        <fieldset>
          <legend>Filter by court type</legend>
          <label><input id="half" type="checkbox" /> Half court</label>
          <label><input id="full" type="checkbox" /> Full court</label>
        </fieldset>

        <p id="court-count" class="court-count" aria-live="polite"></p>
        <div id="court-list" class="court-list"></div>
      </aside>
      <section id="map" aria-label="Interactive map of basketball courts"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="script.js"></script>
  </body>
</html>
